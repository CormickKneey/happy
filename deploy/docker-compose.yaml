services:
  # ──────────────────────────────────────────────
  # Caddy — reverse proxy with automatic HTTPS
  # ──────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server
      - webapp
      - minio
    networks:
      - hoppers

  # ──────────────────────────────────────────────
  # Database Migration (runs once before server)
  # ──────────────────────────────────────────────
  migrate:
    build:
      context: ..
      dockerfile: Dockerfile.server
    command: npx prisma migrate deploy --schema packages/hoppers-server/prisma/schema.prisma
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hoppers}:${POSTGRES_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:-hoppers}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hoppers

  # ──────────────────────────────────────────────
  # API Server
  # ──────────────────────────────────────────────
  server:
    build:
      context: ..
      dockerfile: Dockerfile.server
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-hoppers}:${POSTGRES_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:-hoppers}
      REDIS_URL: redis://redis:6379
      S3_HOST: minio
      S3_PORT: "9000"
      S3_USE_SSL: "false"
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-hoppers}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?required}
      S3_BUCKET: ${S3_BUCKET:-hoppers}
      S3_PUBLIC_URL: https://files.${DOMAIN:-hoppers.cc}/${S3_BUCKET:-hoppers}
      PUBLIC_URL: https://api.${DOMAIN:-hoppers.cc}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - hoppers

  # ──────────────────────────────────────────────
  # Web App (Expo web export served by Nginx)
  # ──────────────────────────────────────────────
  webapp:
    build:
      context: ..
      dockerfile: Dockerfile.webapp
      args:
        POSTHOG_API_KEY: ${POSTHOG_API_KEY:-}
        REVENUE_CAT_STRIPE: ${REVENUE_CAT_STRIPE:-}
    restart: unless-stopped
    networks:
      - hoppers

  # ──────────────────────────────────────────────
  # PostgreSQL
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hoppers}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-hoppers}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hoppers}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - hoppers

  # ──────────────────────────────────────────────
  # Redis
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - hoppers

  # ──────────────────────────────────────────────
  # MinIO (S3-compatible object storage)
  # ──────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-hoppers}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?required}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - hoppers

  # ──────────────────────────────────────────────
  # MinIO bucket auto-creation (runs once)
  # ──────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set hoppers http://minio:9000 ${MINIO_ROOT_USER:-hoppers} ${MINIO_ROOT_PASSWORD:?required};
        mc mb --ignore-existing hoppers/${S3_BUCKET:-hoppers};
        mc anonymous set download hoppers/${S3_BUCKET:-hoppers};
        echo 'Bucket ready';
      "
    networks:
      - hoppers

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  minio_data:

networks:
  hoppers:
    driver: bridge
