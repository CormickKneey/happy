name: CLI Smoke Test

on:
  push:
    branches: [ main ]
    paths:
      - 'packages/hoppers-cli/**'
      - '.github/workflows/cli-smoke-test.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'packages/hoppers-cli/**'
      - '.github/workflows/cli-smoke-test.yml'
  workflow_dispatch:

jobs:
  smoke-test-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 24]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'yarn'
        cache-dependency-path: yarn.lock

    - name: Install dependencies
      run: yarn install --immutable

    - name: Build package
      run: yarn workspace hoppers build

    - name: Pack package
      run: yarn workspace hoppers pack

    - name: Install packed package globally
      run: |
        PACKAGE_FILE=$(ls packages/hoppers-cli/*.tgz)
        npm install -g "./$PACKAGE_FILE"

    - name: Test binary execution
      run: |
        # Test that the binary starts successfully
        echo "Testing hoppers --help..."
        timeout 30s hoppers --help || {
          echo "Error: hoppers --help failed or timed out"
          exit 1
        }

        echo "Testing hoppers --version..."
        timeout 10s hoppers --version || {
          echo "Error: hoppers --version failed or timed out"
          exit 1
        }

        echo "Testing hoppers doctor..."
        timeout 30s hoppers doctor || {
          echo "Error: hoppers doctor failed or timed out"
          exit 1
        }

        echo "Testing hoppers daemon status..."
        timeout 10s hoppers daemon status || {
          echo "Error: hoppers daemon status failed or timed out"
          exit 1
        }

        echo "Smoke test passed on Linux!"

  smoke-test-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: [20, 24]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'yarn'
        cache-dependency-path: yarn.lock

    - name: Install dependencies
      run: yarn install --immutable

    - name: Build package
      run: yarn workspace hoppers build

    - name: Pack package
      run: yarn workspace hoppers pack

    - name: Install packed package globally
      shell: cmd
      run: |
        for %%f in (packages\hoppers-cli\*.tgz) do npm install -g "%%f"

    - name: Debug npm global installation structure
      shell: cmd
      run: |
        for /f "tokens=*" %%i in ('npm config get prefix') do set NPM_PREFIX=%%i
        echo NPM_PREFIX: %NPM_PREFIX%
        echo Listing npm prefix directory:
        dir "%NPM_PREFIX%" 2>nul || echo Failed to list NPM_PREFIX
        echo.
        echo Checking for node_modules in npm prefix:
        if exist "%NPM_PREFIX%\node_modules" (
          echo Found node_modules directory
          dir "%NPM_PREFIX%\node_modules" 2>nul
          echo.
          echo Checking for hoppers package:
          if exist "%NPM_PREFIX%\node_modules\hoppers" (
            echo Found hoppers package
            dir "%NPM_PREFIX%\node_modules\hoppers" 2>nul
            echo.
            echo Checking for dist directory:
            if exist "%NPM_PREFIX%\node_modules\hoppers\dist" (
              echo Found dist directory
              dir "%NPM_PREFIX%\node_modules\hoppers\dist" 2>nul
            ) else (
              echo No dist directory found
            )
          ) else (
            echo No hoppers package found
          )
        ) else (
          echo No node_modules directory found
        )

    - name: Test binary execution
      shell: cmd
      run: |
        @echo on

        rem Get npm global prefix and add to PATH
        for /f "tokens=*" %%i in ('npm config get prefix') do set NPM_PREFIX=%%i
        set PATH=%NPM_PREFIX%;%PATH%
        echo NPM_PREFIX: %NPM_PREFIX%
        echo Current PATH: %PATH%

        rem Debug: Check if hoppers exists in various locations
        echo Checking for hoppers binary...
        where hoppers 2>nul && echo Found hoppers in PATH || echo hoppers not found in PATH
        if exist "%NPM_PREFIX%\hoppers.cmd" echo Found hoppers.cmd in NPM_PREFIX
        if exist "%NPM_PREFIX%\node_modules\.bin\hoppers.cmd" echo Found hoppers.cmd in .bin directory
        dir "%NPM_PREFIX%\*hoppers*" 2>nul || echo No hoppers files found in NPM_PREFIX

        rem Debug: Check the actual contents and encoding of the installed file
        if exist "%NPM_PREFIX%\hoppers.cmd" (
          echo File size and type:
          dir "%NPM_PREFIX%\hoppers.cmd"
          echo.
          echo First few lines of the file:
          type "%NPM_PREFIX%\hoppers.cmd" | head -5
          echo.
          echo Hex dump of first 50 bytes to check line endings:
          powershell -Command "Get-Content '%NPM_PREFIX%\hoppers.cmd' -Encoding Byte -TotalCount 50 | ForEach-Object { '{0:X2}' -f $_ } | Join-String -Separator ' '"
          echo.
          echo Testing with direct path...
          "%NPM_PREFIX%\hoppers.cmd" --help
        ) else (
          echo Testing hoppers --help...
          hoppers --help
        )
        if errorlevel 1 (
          echo Error: hoppers --help failed
          exit /b 1
        )

        rem Test version
        if exist "%NPM_PREFIX%\hoppers.cmd" (
          "%NPM_PREFIX%\hoppers.cmd" --version
        ) else (
          hoppers --version
        )
        if errorlevel 1 (
          echo Error: hoppers --version failed
          exit /b 1
        )

        rem Test doctor
        echo Testing hoppers doctor...
        if exist "%NPM_PREFIX%\hoppers.cmd" (
          "%NPM_PREFIX%\hoppers.cmd" doctor
        ) else (
          hoppers doctor
        )
        if errorlevel 1 (
          echo Error: hoppers doctor failed
          exit /b 1
        )

        rem Test daemon status
        echo Testing hoppers daemon status...
        if exist "%NPM_PREFIX%\hoppers.cmd" (
          "%NPM_PREFIX%\hoppers.cmd" daemon status
        ) else (
          hoppers daemon status
        )
        if errorlevel 1 (
          echo Error: hoppers daemon status failed
          exit /b 1
        )

        echo Smoke test passed on Windows!

# We don't need a smoke test for macOS because most contributors are developing on macOS.
